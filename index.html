<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ŞEHRİN EFENDİLERİ CS 1.6</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

/* HERO */

.hero{
position:relative;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.hero img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(55%);
}

/* OVERLAY */

.overlay{
position:relative;
z-index:2;
padding:20px;
}

/* BAŞLIK */

.overlay h1{
font-size:42px;
margin-bottom:10px;
text-shadow:0 4px 12px rgba(0,0,0,0.9);
}

.overlay p{
margin-bottom:25px;
font-size:18px;
text-shadow:0 2px 8px rgba(0,0,0,0.8);
}

/* BUTONLAR */

button{
border:none;
border-radius:10px;
padding:16px 26px;
font-size:18px;
cursor:pointer;
transition:0.2s;
margin:10px;
max-width:90%;
}

/* IP BUTON */

.ip{
background:#3b82f6;
color:white;
}

.ip:hover{
background:#2563eb;
}

/* RANK BUTON */

.rank{
background:#22c55e;
color:white;
}

.rank:hover{
background:#16a34a;
}

/* MOBİL */

@media (max-width:768px){

.overlay h1{
font-size:28px;
}

.overlay p{
font-size:16px;
}

button{
font-size:16px;
padding:14px 18px;
}

}

</style>
</head>

<body>

<div class="hero">

<img src="banner.jpg">

<div class="overlay">

<h1>ŞEHRİN EFENDİLERİ CS 1.6</h1>

<p>HİLESİZ POOLDAY SERVER</p>

<button class="ip" onclick="copyIP()">
SERVER IP : 95.173.173.81:27015
</button>

<br>

<a href="https://panel25.oyunyoneticisi.com/rank/rank_all.php?ip=95.173.173.81" target="_blank">

<button class="rank">
SIRALAMANI GÖR
</button>

</a>

</div>
</div>

<script>

function copyIP(){

navigator.clipboard.writeText("95.173.173.81:27015");

alert("SERVER IP KOPYALANDI!");

}

</script>

</body>
</html>
