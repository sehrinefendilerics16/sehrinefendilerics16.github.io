<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŞEHRİN EFENDİLERİ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #000; color: white; overflow: hidden; }
        
        .hero { 
            height: 100vh; 
            width: 100%; 
            display: flex; 
            align-items: flex-start; 
            justify-content: center; 
            text-align: center; 
            background: url("banner.jpg") center/cover no-repeat; 
            position: relative; 
            padding-top: 80px; 
        }
        
        .hero::before { 
            content: ""; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); /* Karakterler görünsün ama butonlar parlasın */
        }

        .hero-content { position: relative; z-index: 2; width: 90%; max-width: 450px; }

        .hero h1 { 
            font-size: clamp(28px, 8vw, 48px); 
            letter-spacing: 5px; 
            margin-bottom: 40px; 
            font-weight: 900; 
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .buttons { display: flex; flex-direction: column; gap: 15px; }

        .btn { 
            width: 100%; 
            padding: 16px 25px; 
            font-size: 15px; 
            font-weight: 700; 
            text-decoration: none; 
            border-radius: 8px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 1. HAFTALIK: Mevcut mavi sayfa ile uyumlu */
        .rank-weekly { 
            background: linear-gradient(135deg, #1e40af, #3b82f6); 
            color: white; 
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.4);
        }

        /* 2. GENEL: Gittiği modern stats sayfasıyla uyumlu (Lacivert/Dark) */
        .rank-general { 
            background: linear-gradient(135deg, #0f172a, #1e293b); 
            color: #f8fafc; 
            border: 1px solid #334155;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.5);
        }

        /* 3. ARŞİV: Siyah & Gold temalı yeni sayfamızla uyumlu */
        .rank-archive { 
            background: linear-gradient(135deg, #111111, #222222); 
            color: #fbbf24; /* Gold Yazı */
            border: 1px solid #fbbf24; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .btn:hover { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            filter: brightness(1.2);
        }

        .btn i { font-size: 18px; }

        @media (max-width: 768px) { 
            .hero { padding-top: 60px; } 
            .hero h1 { letter-spacing: 3px; }
        }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-content">
        <h1>ŞEHRİN EFENDİLERİ</h1>
        <div class="buttons">
            <a class="btn rank-weekly" href="https://panel25.oyunyoneticisi.com/rank/rank_all.php?ip=95.173.173.81" target="_blank">
                <i class="fas fa-bolt"></i> HAFTALIK SIRALAMA
            </a>
            
            <a class="btn rank-general" href="https://cs16-stats.onrender.com" target="_blank">
                <i class="fas fa-chart-line"></i> GENEL SIRALAMA
            </a>

            <a class="btn rank-archive" href="https://sehrin-efendileri-arsiv.onrender.com" target="_blank">
                <i class="fas fa-archive"></i> HAFTALIK ARŞİV
            </a>
        </div>
    </div>
</section>

</body>
</html>
