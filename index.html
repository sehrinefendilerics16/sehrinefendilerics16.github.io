<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŞEHRİN EFENDİLERİ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #000;
            color: white;
            overflow: hidden;
        }

        /* HERO ALANI */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
            background: url("banner.jpg") center/cover no-repeat;
            position: relative;
            padding-top: 100px;
        }

        /* KARARTMA KATMANI */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 500px;
        }

        .hero h1 {
            font-size: clamp(32px, 8vw, 56px);
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
            font-weight: 900;
        }

        /* BUTON ALANI (DİKEY DİZİLİM) */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            width: 100%;
            padding: 18px 30px;
            font-size: 18px;
            font-weight: 800;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* HAFTALIK SIRALAMA (MAVİ) */
        .rank-weekly {
            background: linear-gradient(135deg, #2d8cff, #1a5bb9);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(45, 140, 255, 0.3);
        }

        .rank-weekly:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #3d97ff, #246cd4);
            box-shadow: 0 6px 20px rgba(45, 140, 255, 0.5);
        }

        /* GENEL SIRALAMA (ALTIN) */
        .rank-general {
            background: linear-gradient(135deg, #facc15, #b48a04);
            color: #422006;
            border: 2px solid #fef08a;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.4);
        }

        .rank-general:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #fde047, #ca8a04);
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.6);
        }

        /* MOBİL İNCE AYAR */
        @media (max-width: 768px) {
            .hero { padding-top: 80px; }
            .btn { font-size: 16px; padding: 16px 20px; }
        }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-content">
        <h1>ŞEHRİN EFENDİLERİ</h1>

        <div class="buttons">
            <a class="btn rank-weekly" href="https://panel25.oyunyoneticisi.com/rank/rank_all.php?ip=95.173.173.81" target="_blank">
                🥇 HAFTALIK SIRALAMA
            </a>

            <a class="btn rank-general" href="https://cs16-stats.onrender.com" target="_blank">
                🏆 GENEL ARŞİV (EFSANELER)
            </a>
        </div>
    </div>
</section>

</body>
</html>
