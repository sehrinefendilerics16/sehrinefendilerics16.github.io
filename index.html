<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ŞEHRİN EFENDİLERİ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
}

/* HERO */

.hero{
height:100vh;
width:100%;
display:flex;
align-items:flex-start;
justify-content:center;
text-align:center;
background:url("banner.jpg") center/cover no-repeat;
position:relative;
padding-top:90px;
}

/* karartma */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

/* içerik */

.hero-content{
position:relative;
z-index:2;
}

/* başlık */

.hero h1{
font-size:56px;
letter-spacing:3px;
margin-bottom:40px;
text-shadow:0 4px 20px rgba(0,0,0,0.9);
}

/* buton alanı */

.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

/* buton */

.btn{
padding:16px 36px;
font-size:18px;
font-weight:bold;
text-decoration:none;
border-radius:8px;
transition:0.25s;
}

/* BAĞLAN BUTONU */

.connect{
background:#ff3b3b;
color:white;
}

.connect:hover{
background:#ff1f1f;
transform:translateY(-2px);
}

/* RANK BUTONU */

.rank{
background:#2d8cff;
color:white;
}

.rank:hover{
background:#1f6fd1;
transform:translateY(-2px);
}

/* mobil */

@media(max-width:768px){

.hero h1{
font-size:34px;
}

.btn{
font-size:16px;
padding:14px 28px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-content">

<h1>ŞEHRİN EFENDİLERİ</h1>

<div class="buttons">

<a class="btn connect"
href="steam://connect/95.173.173.81:27015">

SUNUCUYA BAĞLAN

</a>

<a class="btn rank"
href="https://panel25.oyunyoneticisi.com/rank/rank_all.php?ip=95.173.173.81"
target="_blank">

SUNUCUNDAKİ SIRALAMANI GÖR

</a>

</div>

</div>

</section>

</body>
</html>
