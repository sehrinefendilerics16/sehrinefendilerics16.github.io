<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŞEHRİN EFENDİLERİ CS 1.6</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

/* HERO */

.hero{
position:relative;
width:100%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* KARARTMA */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.60);
z-index:1;
}

/* ARKA PLAN GÖRSEL */

.hero img{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100%;
max-width:900px;
border-radius:15px;
z-index:0;
}

/* YAZI BLOĞU */

.overlay{
position:relative;
z-index:2;
max-width:600px;
padding:20px;
}

.overlay h1{
font-size:34px;
margin-bottom:10px;
}

.overlay p{
opacity:0.9;
margin-bottom:30px;
}

/* BUTONLAR */

button{
padding:16px 40px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.ip{
background:#3b82f6;
color:white;
}

.rank{
background:#22c55e;
color:white;
}

/* MOBİL */

@media (max-width:768px){

.hero{
height:auto;
padding-top:40px;
padding-bottom:40px;
}

.hero img{
width:95%;
}

.overlay h1{
font-size:24px;
}

button{
width:85%;
}

}

</style>
</head>

<body>

<div class="hero">

<img src="banner.jpg">

<div class="overlay">

<h1>ŞEHRİN EFENDİLERİ CS 1.6</h1>

<p>HİLESİZ POOLDAY SERVER</p>

<button class="ip" onclick="copyIP()">SERVER IP : 95.173.173.81:27015</button>

<br>

<a href="https://panel25.oyunyoneticisi.com/rank/rank_all.php?ip=95.173.173.81" target="_blank">

<button class="rank">
SUNUCUDAKİ SIRALAMANI GÖRMEK İÇİN TIKLA
</button>

</a>

</div>
</div>

<script>

function copyIP(){

navigator.clipboard.writeText("95.173.173.81:27015");

alert("SERVER IP KOPYALANDI!");

</script>

</body>
</html>
